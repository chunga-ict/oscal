// ── OSCAL Component JSON 생성 ─────────────────────────────────────
function buildOSCALComponent(solution, domain, controls) {
  return {
    "component-definition": {
      "uuid": `comp-${domain.toLowerCase()}-${solution.name.replace(/\s+/g,"-").toLowerCase()}-001`,
      "metadata": {
        "title": `${solution.name} Security Component`,
        "last-modified": new Date().toISOString().split("T")[0],
        "version": "1.0.0",
        "oscal-version": "1.1.2",
        "remarks": `17개 도메인 프레임워크 기반 자동 생성. 도메인: ${domain}`
      },
      "components": [{
        "uuid": `comp-${Math.random().toString(36).substr(2,8)}`,
        "type": solution.type === "OSS" ? "software" : solution.type === "SaaS" ? "service" : "software",
        "title": solution.name,
        "description": solution.desc,
        "props": [
          { "name": "vendor",            "value": solution.name.split(" ")[0] },
          { "name": "deployment-model",  "value": solution.type },
          { "name": "api-type",          "value": solution.api },
          { "name": "domain-coverage",   "value": domain },
          { "name": "regulation-coverage","value": solution.coverage.join(", ") },
        ],
        "control-implementations": [{
          "uuid": `ci-${Math.random().toString(36).substr(2,8)}`,
          "source": "https://raw.githubusercontent.com/usnistgov/oscal-content/main/nist.gov/SP800-53/rev5/json/NIST_SP-800-53_rev5_catalog.json",
          "description": `${solution.name}의 ${domain} 도메인 통제 구현 명세`,
          "implemented-requirements": controls.map(ctrl => ({
            "uuid": `ir-${Math.random().toString(36).substr(2,8)}`,
            "control-id": ctrl,
            "description": `${solution.name}이 ${ctrl} 통제를 구현하는 방법`,
            "props": [{
              "name": "implementation-status",
              "value": "implemented"
            }],
            "statements": [{
              "statement-id": `${ctrl}_stmt.a`,
              "uuid": `stmt-${Math.random().toString(36).substr(2,8)}`,
              "description": `${solution.name} API를 통해 ${ctrl} 통제 준수 상태를 자동으로 검증합니다.`
            }],
            "by-components": [{
              "component-uuid": `comp-ref-001`,
              "uuid": `bc-${Math.random().toString(36).substr(2,8)}`,
              "description": `${solution.name} ${solution.api} API로 실시간 준수 확인 가능`,
              "implementation-status": { "state": "implemented" }
            }]
          }))
        }]
      }]
    }
  };
}

// ── API Contract 생성 ─────────────────────────────────────────────
function buildAPIContract(solution, domain, gapItem) {
  return {
    "openapi": "3.1.0",
    "info": {
      "title": `${solution.name} OSCAL Compliance API Contract`,
      "version": "1.0.0",
      "description": `17도메인 프레임워크 기반 ${domain} 갭 조치를 위한 API 계약.\n갭: ${gapItem?.gap || "N/A"}\n규제: ${gapItem?.regulation || "N/A"}`,
      "x-oscal": {
        "component-uuid": `comp-${domain.toLowerCase()}-001`,
        "control-ids": [gapItem?.control || "ac-1"],
        "regulation-mapping": solution.coverage,
        "implementation-status": "contractual"
      }
    },
    "servers": [{ "url": `https://api.${solution.name.replace(/\s+/g,"-").toLowerCase()}.com/v1` }],
    "paths": {
      "/oscal/compliance-status": {
        "get": {
          "summary": "OSCAL 준수 상태 조회",
          "description": `NIST OSCAL SSP 형식으로 ${domain} 통제 구현 상태 반환`,
          "operationId": "getOSCALComplianceStatus",
          "parameters": [
            { "name": "control-id", "in": "query", "required": false, "schema": { "type": "string", "example": gapItem?.control || "ac-2" }},
            { "name": "framework",  "in": "query", "required": false, "schema": { "type": "string", "enum": solution.coverage }},
            { "name": "as-of",      "in": "query", "required": false, "schema": { "type": "string", "format": "date-time" }}
          ],
          "responses": {
            "200": {
              "description": "OSCAL SSP 형식 준수 상태",
              "content": {
                "application/oscal+json": {
                  "schema": {
                    "type": "object",
                    "properties": {
                      "system-security-plan": {
                        "type": "object",
                        "properties": {
                          "control-implementation": { "type": "object" },
                          "implemented-requirements": {
                            "type": "array",
                            "items": {
                              "type": "object",
                              "required": ["control-id","implementation-status"],
                              "properties": {
                                "control-id":           { "type": "string" },
                                "implementation-status":{ "type": "string", "enum":["implemented","partial","planned","not-applicable","alternative"] },
                                "description":          { "type": "string" },
                                "evidence": {
                                  "type": "array",
                                  "items": {
                                    "type": "object",
                                    "properties": {
                                      "type":      { "type":"string" },
                                      "timestamp": { "type":"string","format":"date-time" },
                                      "data":      { "type":"object" }
                                    }
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          },
          "x-oscal-evidence": {
            "collection-method": "automated-api",
            "frequency": "real-time",
            "audit-trail": true
          }
        }
      },
      "/oscal/gap-remediation": {
        "post": {
          "summary": "갭 조치 실행",
          "description": `${gapItem?.gap || "식별된 갭"}에 대한 자동 조치 트리거`,
          "operationId": "triggerGapRemediation",
          "requestBody": {
            "required": true,
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "required": ["poam-item-id","remediation-action"],
                  "properties": {
                    "poam-item-id":        { "type":"string", "description":"OSCAL POA&M 항목 UUID" },
                    "control-id":          { "type":"string", "example": gapItem?.control },
                    "remediation-action":  { "type":"string", "enum":["enforce","remediate","accept-risk","transfer"] },
                    "target-date":         { "type":"string", "format":"date" },
                    "justification":       { "type":"string" }
                  }
                }
              }
            }
          },
          "responses": {
            "202": {
              "description": "조치 수락됨 - OSCAL POA&M 업데이트됨",
              "content": {
                "application/oscal+json": {
                  "schema": {
                    "type":"object",
                    "properties": {
                      "poam-item": { "type":"object" },
                      "milestone": { "type":"object" },
                      "status":    { "type":"string" }
                    }
                  }
                }
              }
            }
          }
        }
      },
      "/oscal/evidence/collect": {
        "post": {
          "summary": "감사 증거 자동 수집",
          "description": "지정된 통제에 대한 증거를 자동 수집하여 OSCAL SAR 형식으로 반환",
          "operationId": "collectEvidence",
          "requestBody": {
            "required": true,
            "content": {
              "application/json": {
                "schema": {
                  "type":"object",
                  "properties": {
                    "control-ids": { "type":"array","items":{"type":"string"} },
                    "evidence-types": { "type":"array","items":{"type":"string","enum":["configuration","log","screenshot","interview","test-result"]} }
                  }
                }
              }
            }
          },
          "responses": {
            "200": {
              "description": "OSCAL SAR 형식 증거 컬렉션",
              "content": { "application/oscal+json": { "schema": { "type":"object" } } }
            }
          }
        }
      }
    },
    "components": {
      "securitySchemes": {
        "oscalApiKey": { "type":"apiKey", "in":"header", "name":"X-OSCAL-API-Key" },
        "bearerAuth":  { "type":"http",   "scheme":"bearer", "bearerFormat":"JWT" }
      }
    },
    "x-oscal-metadata": {
      "profile-source":   "cai-17domain-profile.json",
      "component-def":    `comp-${domain.toLowerCase()}-001.json`,
      "poam-reference":   "cai-poam-2026.json",
      "auto-evidence":    true,
      "verification-sla": "15min"
    }
  };
}

// ── POA&M JSON 생성 ───────────────────────────────────────────────
function buildPOAM(gaps) {
  return {
    "plan-of-action-and-milestones": {
      "uuid": `poam-cai-2026-${Date.now()}`,
      "metadata": {
        "title": "CAI 17도메인 갭 조치 계획 (POA&M)",
        "last-modified": new Date().toISOString().split("T")[0],
        "version": "1.0",
        "oscal-version": "1.1.2"
      },
      "system-id": { "identifier-type": "https://ietf.org/rfc/rfc4122", "id": "cai-system-001" },
      "poam-items": gaps.map((g, i) => ({
        "uuid": `poam-item-${String(i+1).padStart(3,"0")}`,
        "title": g.gap,
        "description": `도메인 ${g.domain} (${g.name}): ${g.gap}`,
        "props": [
          { "name":"severity",   "value": g.severity },
          { "name":"domain",     "value": g.domain },
          { "name":"regulation", "value": g.regulation },
        ],
        "related-findings": [{ "finding-uuid": `finding-${String(i+1).padStart(3,"0")}` }],
        "origins": [{ "actors": [{ "type":"party", "actor-uuid":"security-team-001" }] }],
        "risk": {
          "uuid": `risk-${String(i+1).padStart(3,"0")}`,
          "title": `${g.gap} 위험`,
          "status": "open",
          "characterizations": [{ "origin": { "actors": [{"type":"party","actor-uuid":"security-team-001"}] }, "facets": [{ "name":"likelihood","system":"https://csrc.nist.gov/ns/oscal","value": g.severity === "CRITICAL" ? "high" : g.severity === "HIGH" ? "medium" : "low" }] }]
        },
        "remediations": [{
          "uuid": `rem-${String(i+1).padStart(3,"0")}`,
          "lifecycle": "recommendation",
          "title": g.remediation,
          "description": `${g.remediation}을 통해 ${g.regulation} 요건 충족`,
          "tasks": [
            { "uuid":`task-${i}-1`, "type":"action","title":"솔루션 도입 검토","timing":{ "within-date-range":{ "start":new Date().toISOString(), "end":new Date(Date.now()+30*24*60*60*1000).toISOString() } } },
            { "uuid":`task-${i}-2`, "type":"action","title":"OSCAL Component 등록","timing":{ "within-date-range":{ "start":new Date().toISOString(), "end":new Date(Date.now()+60*24*60*60*1000).toISOString() } } },
            { "uuid":`task-${i}-3`, "type":"action","title":"API Contract 검증","timing":{ "within-date-range":{ "start":new Date().toISOString(), "end":new Date(Date.now()+90*24*60*60*1000).toISOString() } } },
          ]
        }]
      }))
    }
  };
}

  g3:    { display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"12px" },
  code:  { background:"#040810", border:`1px solid ${C.border}`, borderLeft:`3px solid ${C.accent}`, borderRadius:"3px", padding:"14px", fontSize:"10px", lineHeight:"1.8", color:"#80cbc4", overflowX:"auto", whiteSpace:"pre", fontFamily:"inherit", maxHeight:"380px", overflow:"auto" },
  code2: { background:"#040810", border:`1px solid ${C.border}`, borderLeft:`3px solid #ab47bc`, borderRadius:"3px", padding:"14px", fontSize:"10px", lineHeight:"1.8", color:"#ce93d8", overflowX:"auto", whiteSpace:"pre", fontFamily:"inherit", maxHeight:"380px", overflow:"auto" },
  info:  { background:"#030d1a", border:`1px solid #0d47a1`, borderLeft:`3px solid #1e88e5`, borderRadius:"3px", padding:"11px 14px", marginBottom:"12px", fontSize:"11px", color:"#90caf9", lineHeight:"1.6" },
  warn:  { background:"#1a0e03", border:`1px solid #e65100`, borderLeft:`3px solid ${C.warning}`, borderRadius:"3px", padding:"11px 14px", marginBottom:"10px", fontSize:"11px", color:C.warning, lineHeight:"1.6" },
  ok:    { background:"#03120a", border:`1px solid #1b5e20`, borderLeft:`3px solid ${C.success}`, borderRadius:"3px", padding:"11px 14px", marginBottom:"10px", fontSize:"11px", color:C.success, lineHeight:"1.6" },
  btn: (v) => ({
    background: v==="p" ? "#013366" : v==="g" ? "#013320" : v==="d" ? "#300030" : C.bg3,
    color:      v==="p" ? C.accent   : v==="g" ? C.success  : v==="d" ? "#ce93d8" : C.textDim,
    border:`1px solid ${v==="p" ? C.accentDim : v==="g" ? "#2e7d32" : v==="d" ? "#6a1b9a" : C.border2}`,
    padding:"7px 16px", borderRadius:"2px", cursor:"pointer",
    fontSize:"10px", letterSpacing:"1.5px", fontWeight:"700",
    fontFamily:"inherit", transition:"all 0.15s",
  }),
  sevBadge: (sev) => ({
    padding:"2px 8px", borderRadius:"2px", fontSize:"9px", fontWeight:"700", letterSpacing:"1px",
    background: sev==="CRITICAL" ? "#7b000022" : sev==="HIGH" ? "#5d180022" : "#4a3a0022",
    border:`1px solid ${sev==="CRITICAL" ? C.critical : sev==="HIGH" ? C.error : C.warning}`,
    color:       sev==="CRITICAL" ? C.critical : sev==="HIGH" ? C.error : C.warning,
  }),
  pipe: (color) => ({
    background: `${color}18`,
    border:`1px solid ${color}44`,
    borderTop:`3px solid ${color}`,
    borderRadius:"4px",
    padding:"14px",
  }),
};

// PIPELINE VIEW
// ═══════════════════════════════════════════════════════════════
function PipelineView({ onStage }) {
  const [active, setActive] = useState(null);
  const flow = [
    { label:"기업 프로파일\n(Compliance DNA)", color:C.accent,   from:"입력" },
    { label:"갭 분석\n(17도메인×규제)",       color:"#ff7043", from:"S1→S2" },
    { label:"솔루션 발굴\n(도메인별 매핑)",   color:"#66bb6a", from:"S2→S3" },
    { label:"OSCAL Component\n자동 생성",      color:"#ab47bc", from:"S3→S4" },
    { label:"API Contract\n(OpenAPI+OSCAL)",    color:"#ffa726", from:"S4→S5" },
    { label:"자동 검증\n(CI/CD 통합)",         color:"#26c6da", from:"S5→S6" },
    { label:"지속 모니터링\n(Living Policy)",  color:"#ec407a", from:"S6→S7" },
  ];

  return (
    <div>
      <div style={s.info}>
        ⬡ 이 파이프라인은 <strong>단방향 워터폴이 아닙니다.</strong> S7(모니터링)에서 발생하는 새 갭은 자동으로 S2(갭 분석)로 피드백되어 <strong>자기 개선하는 순환 루프</strong>를 형성합니다. 각 단계를 클릭하면 상세 보기로 이동합니다.
      </div>

      {/* 파이프라인 플로우 */}
      <div style={{ overflowX:"auto", marginBottom:"24px" }}>
        <div style={{ display:"flex", alignItems:"center", gap:"0", minWidth:"980px", padding:"20px 0" }}>
          {flow.map((f, i) => (
            <div key={i} style={{ display:"flex", alignItems:"center", flex:1 }}>
              <div
                onClick={() => { setActive(i); onStage && onStage(i); }}
                style={{
                  flex:1, background:`${f.color}15`, border:`1px solid ${f.color}55`,
                  borderTop:`3px solid ${f.color}`, borderRadius:"4px",
                  padding:"14px 10px", textAlign:"center", cursor:"pointer",
                  transition:"all 0.2s",
                  boxShadow: active===i ? `0 0 20px ${f.color}44` : "none",
                  transform: active===i ? "translateY(-3px)" : "none",
                }}>
                <div style={{ color:f.color, fontSize:"10px", fontWeight:"700", letterSpacing:"1px", marginBottom:"6px" }}>
                  S{i+1}
                </div>
                <div style={{ color:C.text, fontSize:"10px", lineHeight:"1.5", whiteSpace:"pre-line" }}>
                  {f.label}
                </div>
              </div>
              {i < flow.length-1 && (
                <div style={{ color:C.textDim, fontSize:"16px", padding:"0 3px", flexShrink:0 }}>→</div>
              )}
            </div>
          ))}
        </div>
      </div>

      {/* 피드백 루프 표시 */}
      <div style={{ ...s.card, textAlign:"center", background:"#040810" }}>
        <div style={{ color:C.textDim, fontSize:"10px", letterSpacing:"2px", marginBottom:"8px" }}>FEEDBACK LOOP</div>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:"8px", flexWrap:"wrap" }}>
          {["S7 모니터링", "→ 신규갭 탐지", "→ S2 갭분석 재실행", "→ S3 솔루션 재매핑", "→ OSCAL POA&M 자동갱신", "→ S7 모니터링"].map((t, i) => (
            <span key={i} style={{ color: i===0||i===5 ? "#ec407a" : i===2 ? "#ff7043" : i===4 ? "#ab47bc" : C.textDim, fontSize:"11px" }}>{t}</span>
          ))}
        </div>
      </div>

      {/* 단계별 요약 카드 */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:"10px", marginTop:"6px" }}>
        {PIPELINE_STAGES.map((stage, i) => (
          <div key={stage.id} onClick={() => onStage && onStage(i)}
            style={{ ...s.pipe(stage.color), cursor:"pointer" }}>
            <div style={{ color:stage.color, fontSize:"10px", fontWeight:"700", letterSpacing:"1px", marginBottom:"4px" }}>
              {stage.id} · {stage.code}
            </div>
            <div style={{ color:C.text, fontSize:"11px", marginBottom:"4px" }}>{stage.label}</div>
            <div style={{ color:C.textDim, fontSize:"10px" }}>{stage.sub}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// GAP ANALYSIS VIEW

  const [sel, setSel] = useState(null);

    acc[g.domain] = acc[g.domain] || [];
    acc[g.domain].push(g);

          { label:"CRITICAL", value:critCount, color:C.critical },
          { label:"HIGH", value:highCount, color:C.error },
          { label:"MEDIUM", value:GAP_DATA.length-critCount-highCount, color:C.warning },
        ].map((item, i) => (
          <div key={i} style={{ background:C.bg3, border:`1px solid ${item.color}44`, borderTop:`2px solid ${item.color}`, borderRadius:"3px", padding:"14px", textAlign:"center" }}>
            <div style={{ color:item.color, fontSize:"28px", fontWeight:"700" }}>{item.value}</div>

                display:"grid", gridTemplateColumns:"55px 1fr auto",
                alignItems:"center", gap:"10px",
                padding:"10px 12px", marginBottom:"6px",
                background: sel?.domain===g.domain ? "#0f2035" : C.bg3,
                border:`1px solid ${sel?.domain===g.domain ? C.accentDim : C.border}`,
                borderLeft:`3px solid ${g.severity==="CRITICAL"?C.critical:g.severity==="HIGH"?C.error:C.warning}`,
                borderRadius:"3px", cursor:"pointer", transition:"all 0.15s",

              <span style={{ color:C.accent, fontWeight:"700", fontSize:"11px" }}>{g.domain}</span>
              <div>
                <div style={{ color:C.text, fontSize:"11px", marginBottom:"3px" }}>{g.gap}</div>
                <div style={{ color:C.textDim, fontSize:"10px" }}>{g.regulation}</div>
              </div>
              <span style={s.sevBadge(g.severity)}>{g.severity}</span>
            </div>
          ))}
        </div>

        <div>
          <div style={s.sec}>선택된 갭 상세</div>
          {sel ? (
            <div style={s.card}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"14px" }}>
                <div>
                  <div style={{ color:C.accent, fontWeight:"700", fontSize:"14px" }}>{sel.domain} · {sel.name}</div>
                  <div style={{ color:C.text, fontSize:"12px", marginTop:"4px" }}>{sel.gap}</div>
                </div>
                <span style={s.sevBadge(sel.severity)}>{sel.severity}</span>
              </div>
              {[
                { label:"관련 규제",     value:sel.regulation },
                { label:"OSCAL 통제 ID", value:sel.control },
                { label:"권장 조치",     value:sel.remediation },

                <div key={i} style={{ display:"grid", gridTemplateColumns:"120px 1fr", gap:"10px", padding:"8px 0", borderTop:`1px solid ${C.border}` }}>
                  <span style={{ color:C.textDim, fontSize:"10px", letterSpacing:"1px" }}>{row.label}</span>
                  <span style={{ color: i===1 ? "#ce93d8" : i===2 ? C.success : C.text, fontSize:"11px" }}>{row.value}</span>
                </div>
              ))}

              <div style={{ marginTop:"16px" }}>
                <div style={{ color:C.textDim, fontSize:"10px", letterSpacing:"1px", marginBottom:"8px" }}>OSCAL POA&M 항목 미리보기</div>
                <div style={s.code}>{JSON.stringify({
                  "uuid": `poam-item-${sel.domain.toLowerCase()}`,
                  "title": sel.gap,
                  "props": [
                    { "name":"severity", "value":sel.severity },
                    { "name":"regulation","value":sel.regulation },
                  ],
                  "remediations": [{
                    "title": sel.remediation,
                    "tasks": [
                      {"type":"action","title":"솔루션 선택 및 도입"},
                      {"type":"action","title":"OSCAL Component 등록"},
                      {"type":"action","title":"API Contract 체결 및 검증"},
                    ]
                  }]
                }, null, 2)}</div>
              </div>
            </div>
          ) : (
            <div style={{ ...s.card, textAlign:"center", padding:"40px", color:C.textDim }}>
              ← 왼쪽에서 갭 항목을 선택하세요
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

            {Object.keys(SOLUTIONS_DB).map(d => (

              <div style={s.ok}>✓ Component 생성 완료 — IBM Trestle로 SSP에 등록 가능</div>
              <div style={s.code2}>{JSON.stringify(generated, null, 2)}</div>
              <div style={{ marginTop:"10px" }}>
                <div style={s.warn}>

            </div>
          )}
        </div>
      </div>
    </div>
  );
}

      <div style={s.info}>

        솔루션이 이 계약을 구현하면, 감사자는 API를 호출해 실시간으로 통제 준수를 확인할 수 있습니다.
        이것이 "문서"가 아닌 "실행 가능한 컴플라이언스"입니다.
      </div>

      <div style={s.g2}>
        <div>
          <div style={s.sec}>① 갭 선택</div>
          {GAP_DATA.map((g,i) => (
            <div key={i} onClick={() => { setSelGap(g); setSelSol(null); setGenerated(null); }}
              style={{ padding:"9px 12px", marginBottom:"5px", background:selGap?.domain===g.domain?C.bg3:"#080e18", border:`1px solid ${selGap?.domain===g.domain?C.accentDim:C.border}`, borderLeft:`2px solid ${g.severity==="CRITICAL"?C.critical:g.severity==="HIGH"?C.error:C.warning}`, borderRadius:"3px", cursor:"pointer" }}>
              <div style={{ display:"flex", justifyContent:"space-between" }}>
                <span style={{ color:C.accent, fontSize:"10px", fontWeight:"700" }}>{g.domain}</span>
                <span style={s.sevBadge(g.severity)}>{g.severity}</span>
              </div>
              <div style={{ color:C.text, fontSize:"11px", marginTop:"3px" }}>{g.gap}</div>
            </div>
          ))}
        </div>

        <div>
          <div style={s.sec}>② 솔루션 선택</div>
          {selGap && sols.map((sol, i) => (
            <div key={i} onClick={() => { setSelSol(sol); setGenerated(null); }}
              style={{ padding:"9px 12px", marginBottom:"5px", background:selSol?.name===sol.name?C.bg3:"#080e18", border:`1px solid ${selSol?.name===sol.name?C.accentDim:C.border}`, borderRadius:"3px", cursor:"pointer" }}>
              <div style={{ color:C.text, fontSize:"11px", fontWeight:"700" }}>{sol.name}</div>
              <div style={{ color:C.textDim, fontSize:"10px", marginTop:"2px" }}>{sol.api} · {sol.coverage.join(", ")}</div>
            </div>
          ))}

          {selGap && selSol && (
            <button style={{ ...s.btn("p"), width:"100%", padding:"10px", marginTop:"6px" }}
              onClick={() => setGenerated(buildAPIContract(selSol, selGap.domain, selGap))}>
              ▶ API CONTRACT 생성
            </button>
          )}
        </div>
      </div>

      {generated && (
        <div style={{ marginTop:"20px" }}>
          <div style={s.ok}>✓ API Contract 생성 완료 — 솔루션 벤더에 제공하여 OSCAL 준수 엔드포인트 구현 요청</div>

          <div style={{ display:"flex", gap:"6px", marginBottom:"12px", flexWrap:"wrap" }}>
            {["openapi","poam","workflow"].map(v => (
              <button key={v} style={s.btn(view===v?"p":"")} onClick={() => setView(v)}>
                {v==="openapi" ? "OpenAPI Contract" : v==="poam" ? "OSCAL POA&M 연동" : "검증 워크플로우"}
              </button>
            ))}
          </div>

          {view === "openapi" && (
            <div>
              <div style={{ color:C.textDim, fontSize:"10px", letterSpacing:"1px", marginBottom:"6px" }}>
                OpenAPI 3.1 + OSCAL 메타데이터 계약 ({selSol?.name})
              </div>
              <div style={s.code}>{JSON.stringify(generated, null, 2)}</div>
              <div style={{ ...s.warn, marginTop:"10px" }}>
                핵심: <code style={{color:"#ffa726"}}>"x-oscal-metadata"</code> 확장 필드가 이 API를 OSCAL 생태계와 연결합니다.
                이 필드 없이는 일반 REST API와 다르지 않습니다.
              </div>
            </div>
          )}

          {view === "poam" && (
            <div style={s.code2}>{JSON.stringify(buildPOAM([selGap]), null, 2)}</div>
          )}

          {view === "workflow" && (
            <div style={s.card}>
              <div style={s.sec}>자동 검증 워크플로우</div>
              {[
                { step:"1. Contract 체결",    desc:`${selSol?.name}에 OpenAPI Contract 전달 → /oscal/compliance-status 엔드포인트 구현 합의`, color:"#00e5ff" },
                { step:"2. CI/CD 통합",        desc:`GitHub Actions에서 매일 POST /oscal/evidence/collect 호출 → 증거 자동 수집`, color:"#66bb6a" },
                { step:"3. SSP 자동 업데이트", desc:`수집된 증거 → OSCAL SAR 형식으로 변환 → SSP implemented-requirements 상태 자동 갱신`, color:"#ab47bc" },
                { step:"4. POA&M 자동 종료",   desc:`준수 확인 시 POA&M 항목 status: closed 자동 업데이트`, color:"#ffa726" },
                { step:"5. 준수율 대시보드",   desc:`전체 통제 구현 상태를 실시간 집계 → 경영진 보고 자동 생성`, color:"#ec407a" },
              ].map((item, i) => (
                <div key={i} style={{ display:"grid", gridTemplateColumns:"180px 1fr", gap:"12px", padding:"10px 0", borderTop:`1px solid ${C.border}` }}>
                  <span style={{ color:item.color, fontSize:"11px", fontWeight:"700" }}>{item.step}</span>
                  <span style={{ color:C.text, fontSize:"11px", lineHeight:"1.5" }}>{item.desc}</span>
                </div>
              ))}

              <div style={{ ...s.code, marginTop:"14px" }}>{"# GitHub Actions 자동 검증 워크플로우\n\
name: OSCAL Compliance Auto-Verify\n\
on:\n\
  schedule:\n\
    - cron: '0 9 * * *'   # 매일 오전 9시\n\
\n\
jobs:\n\
  verify:\n\
    runs-on: ubuntu-latest\n\
    steps:\n\
      - name: Collect Evidence via API\n\
        run: |\n\
          curl -X POST \\\\\n\
            -H \"X-OSCAL-API-Key: $" + "{{ secrets.OSCAL_API_KEY }}" + "\" \\\\\n\
            -H \"Content-Type: application/json\" \\\\\n\
            -d '{\"control-ids\":[\"" + (selGap ? selGap.control : "") + "\"],\"evidence-types\":[\"configuration\",\"log\"]}' \\\\\n\
            https://api." + (selSol ? selSol.name.replace(/\s+/g,"-").toLowerCase() : "solution") + ".com/v1/oscal/evidence/collect \\\\\n\
            -o evidence.json\n\
\n\
      - name: Update OSCAL SSP\n\
        run: |\n\
          trestle author ssp-assemble \\\\\n\
            --name cai-ssp \\\\\n\
            --output cai-ssp-updated.json\n\
\n\
      - name: Update POA&M\n\
        run: python scripts/update_poam.py --evidence evidence.json\n\
\n\
      - name: Calculate Compliance Score\n\
        run: python scripts/calc_score.py --ssp cai-ssp-updated.json"}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// MONITORING VIEW
// ═══════════════════════════════════════════════════════════════
function MonitorView() {
  const [tick, setTick] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setTick(t => t+1), 3000);
    return () => clearInterval(id);
  }, []);

  const scores = {
    D01:{ score:82, trend:"+3" }, D03:{ score:71, trend:"-2" },
    D06:{ score:65, trend:"+5" }, D09:{ score:78, trend:"+1" },
    D10:{ score:88, trend:"+0" }, D15:{ score:60, trend:"+8" },
  };

  const events = [
    { time:"09:14", type:"GAP",     msg:"D03: MFA 비적용 계정 2개 신규 탐지 → POA&M 자동 갱신" },
    { time:"09:08", type:"VERIFY",  msg:"D06: Tenable 스캔 완료 → 3개 CVE 신규 등록" },
    { time:"08:55", type:"CLOSED",  msg:"D07: HashiCorp Vault 키 교체 완료 → POA&M 항목 CLOSED" },
    { time:"08:30", type:"WARN",    msg:"D15: GDPR 국외 이전 계약 만료 D-30 경고" },
    { time:"07:00", type:"VERIFY",  msg:"D09: Wazuh 일일 로그 수집 완료 → SAR 업데이트" },
  ];

  const scoreColor = (s) => s >= 85 ? C.success : s >= 70 ? "#26c6da" : s >= 55 ? C.warning : C.error;

  return (
    <div>
      <div style={s.info}>
        🔄 <strong>Living Policy 상태:</strong> API Contract를 통해 수집된 증거가 OSCAL SSP를 실시간 업데이트합니다.
        <span style={{ color:C.success }}> ● LIVE</span> — 3초마다 새로고침 시뮬레이션 중
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:"10px", marginBottom:"20px" }}>
        {[
          { label:"전체 준수율",     value:`${73 + (tick%3)}%`,     color:C.warning },
          { label:"미해결 POA&M",    value:`${7 - (tick%2)}건`,      color:C.error },
          { label:"자동 검증 통제",  value:`${43 + tick%5}개`,       color:C.success },
          { label:"증거 수집 완료",  value:`${91 + tick%4}%`,        color:C.accent },
          { label:"API 활성 Contract",value:"12개",                  color:"#ab47bc" },
          { label:"마지막 스캔",     value:`${tick%60}분 전`,         color:C.textDim },
        ].map((item, i) => (
          <div key={i} style={{ background:C.bg3, border:`1px solid ${item.color}44`, borderTop:`2px solid ${item.color}`, borderRadius:"3px", padding:"14px", textAlign:"center" }}>
            <div style={{ color:item.color, fontSize:"22px", fontWeight:"700" }}>{item.value}</div>
            <div style={{ color:C.textDim, fontSize:"10px", marginTop:"4px" }}>{item.label}</div>
          </div>
        ))}
      </div>

      <div style={s.g2}>
        <div>
          <div style={s.sec}>도메인별 실시간 준수율</div>
          {Object.entries(scores).map(([domain, data], i) => (
            <div key={i} style={{ marginBottom:"10px" }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:"5px" }}>
                <span style={{ color:C.accent, fontSize:"11px", fontWeight:"700" }}>{domain}</span>
                <div style={{ display:"flex", gap:"8px", alignItems:"center" }}>
                  <span style={{ color:data.trend.startsWith("+") && data.trend!=="+0" ? C.success : data.trend.startsWith("-") ? C.error : C.textDim, fontSize:"10px" }}>{data.trend}</span>
                  <span style={{ color:scoreColor(data.score), fontWeight:"700", fontSize:"12px" }}>{data.score + (tick%3===0&&domain==="D03"?-1:0)}%</span>
                </div>
              </div>
              <div style={{ height:"6px", background:C.bg3, borderRadius:"3px", overflow:"hidden" }}>
                <div style={{ height:"100%", width:`${data.score}%`, background:`linear-gradient(90deg, ${scoreColor(data.score)}88, ${scoreColor(data.score)})`, borderRadius:"3px", transition:"width 0.5s" }}/>
              </div>
            </div>
          ))}
        </div>

        <div>
          <div style={s.sec}>실시간 이벤트 피드</div>
          {events.map((ev, i) => (
            <div key={i} style={{ padding:"8px 12px", marginBottom:"5px", background:C.bg3, border:`1px solid ${C.border}`, borderLeft:`3px solid ${ev.type==="GAP"?C.error:ev.type==="WARN"?C.warning:ev.type==="CLOSED"?C.success:C.accentDim}`, borderRadius:"3px" }}>
              <div style={{ display:"flex", gap:"8px", alignItems:"center", marginBottom:"4px" }}>
                <span style={{ color:C.textDim, fontSize:"10px" }}>{ev.time}</span>
                <span style={{ color:ev.type==="GAP"?C.error:ev.type==="WARN"?C.warning:ev.type==="CLOSED"?C.success:C.accentDim, fontSize:"9px", fontWeight:"700", letterSpacing:"1px" }}>{ev.type}</span>
              </div>
              <div style={{ color:C.text, fontSize:"11px" }}>{ev.msg}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ ...s.card, marginTop:"8px" }}>
        <div style={s.sec}>피드백 루프 자동화 상태</div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:"10px" }}>
          {[
            { label:"갭 탐지 → POA&M 생성",      status:"AUTO", color:C.success },
            { label:"솔루션 API → 증거 수집",      status:"AUTO", color:C.success },
            { label:"증거 → SSP 업데이트",          status:"AUTO", color:C.success },
            { label:"POA&M 항목 자동 종료",         status:"AUTO", color:C.success },
            { label:"규제 변경 모니터링",           status:"BETA", color:C.warning },
            { label:"CVE 피드 → 취약점 연동",       status:"AUTO", color:C.success },
            { label:"K-ISMS-P 카탈로그 갱신",       status:"수동", color:C.error },
            { label:"경영진 보고 자동 생성",         status:"AUTO", color:C.success },
          ].map((item, i) => (
            <div key={i} style={{ padding:"10px", background:C.bg3, border:`1px solid ${C.border}`, borderRadius:"3px" }}>
              <div style={{ color:C.text, fontSize:"10px", lineHeight:"1.4", marginBottom:"6px" }}>{item.label}</div>
              <span style={{ background:`${item.color}22`, border:`1px solid ${item.color}55`, color:item.color, padding:"2px 8px", borderRadius:"2px", fontSize:"9px", fontWeight:"700" }}>{item.status}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// ARCHITECTURE VIEW
// ═══════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════
const TABS = [
  { id:"pipeline",   label:"PIPELINE",    component: PipelineView  },
  { id:"gap",        label:"GAP 분석",    component: GapView       },
  { id:"solution",   label:"솔루션 매핑", component: SolutionView  },
  { id:"component",  label:"OSCAL COMP",  component: ComponentView },
  { id:"contract",   label:"API CONTRACT",component: ContractView  },
  { id:"monitor",    label:"MONITORING",  component: MonitorView   },
  { id:"arch",       label:"ARCHITECTURE",component: ArchView      },
];

function App() {
  const [activeTab, setActiveTab] = useState("pipeline");
  const [crossState, setCrossState] = useState({});
  const ActiveComponent = TABS.find(t => t.id === activeTab)?.component;

  return (
    <div style={s.app}>
      <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>

      <div style={s.hdr}>
        <div>
          <div style={{ color:C.accent, fontSize:"16px", fontWeight:"700", letterSpacing:"2px" }}>
            COMPLIANCE INTELLIGENCE PIPELINE
          </div>
          <div style={{ color:C.textDim, fontSize:"10px", letterSpacing:"1px", marginTop:"3px" }}>
            17 Domains · GAP → Solution → OSCAL Component → API Contract → Auto-Verify
          </div>
        </div>
        <div style={{ display:"flex", gap:"8px", alignItems:"center" }}>
          <span style={{ color:C.success, fontSize:"10px" }}>● LIVE</span>
          <span style={{ background:C.bg3, border:`1px solid ${C.border}`, color:C.textDim, padding:"4px 12px", borderRadius:"2px", fontSize:"10px", letterSpacing:"1px" }}>
            OSCAL 1.1.2
          </span>
        </div>
      </div>

      <div style={s.tabs}>
        {TABS.map(tab => (
          <button key={tab.id} style={s.tab(activeTab===tab.id)} onClick={() => setActiveTab(tab.id)}>
            {tab.label}
          </button>
        ))}
      </div>

      <div style={s.main}>
        <ActiveComponent
          onStage={(i) => setActiveTab(TABS[Math.min(i+1, TABS.length-1)].id)}
          onSelectGap={(g) => setCrossState(prev => ({...prev, gap:g}))}
          preselectedGap={crossState.gap}
        />
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));

    </script>
